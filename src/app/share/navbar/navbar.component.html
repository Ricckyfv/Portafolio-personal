<header class="bg-slate-950/80 backdrop-blur-md w-full top-0 sticky z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-1">

    <a routerLink="/" class="flex items-center hover:opacity-80 transition-transform duration-300 scale-125 md:scale-[1.7] origin-left">
      <img src="/logo-3.png" alt="Logo RiickyDev" class="h-20 w-auto object-contain">
    </a>

    <nav class="hidden md:flex gap-6 items-center">
      <a routerLink="/" routerLinkActive="text-sky-500 border-b-2 border-sky-500 pb-1" [routerLinkActiveOptions]="{exact: true}" class="text-slate-400 hover:text-slate-100 font-sans text-sm font-medium tracking-wide transition-all px-2 py-1 duration-200">Inicio</a>
      <a routerLink="/sobre-mi" routerLinkActive="text-sky-500 border-b-2 border-sky-500 pb-1" class="text-slate-400 hover:text-slate-100 font-sans text-sm font-medium tracking-wide hover:bg-slate-800/50 rounded-md transition-all px-2 py-1 duration-200">Sobre Mí</a>
      <a routerLink="/proyectos" routerLinkActive="text-sky-500 border-b-2 border-sky-500 pb-1" class="text-slate-400 hover:text-slate-100 font-sans text-sm font-medium tracking-wide hover:bg-slate-800/50 rounded-md transition-all px-2 py-1 duration-200">Proyectos</a>
      <a routerLink="/contacto" routerLinkActive="text-sky-500 border-b-2 border-sky-500 pb-1" class="text-slate-400 hover:text-slate-100 font-sans text-sm font-medium tracking-wide hover:bg-slate-800/50 rounded-md transition-all px-2 py-1 duration-200">Contacto</a>
    </nav>

    <div class="hidden md:flex items-center gap-4">
      <a href="/cv-daw.pdf" target="_blank" download="CV_Ricardo-Fernandez.pdf" class="bg-transparent border border-outline text-on-surface hover:bg-surface-variant hover:border-primary-container transition-all rounded-full px-4 py-2 font-label-caps text-label-caps cursor-pointer">
        Descargar CV
      </a>
    </div>

    <button class="md:hidden text-slate-300 hover:text-white focus:outline-none" (click)="toggleMenu()" aria-label="Abrir menú">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path [class.hidden]="isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        <path [class.hidden]="!isMobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

  </div>

  <div [class.hidden]="!isMobileMenuOpen" class="md:hidden absolute top-full left-0 w-full bg-slate-950/95 backdrop-blur-lg border-b border-slate-800 shadow-xl border-t">
    <nav class="flex flex-col px-6 py-4 gap-2">
      <a routerLink="/" routerLinkActive="text-sky-400 font-bold bg-slate-800/50" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()" class="text-slate-300 hover:text-white text-base py-3 px-4 rounded-lg transition-colors">Inicio</a>
      <a routerLink="/sobre-mi" routerLinkActive="text-sky-400 font-bold bg-slate-800/50" (click)="closeMenu()" class="text-slate-300 hover:text-white text-base py-3 px-4 rounded-lg transition-colors">Sobre Mí</a>
      <a routerLink="/proyectos" routerLinkActive="text-sky-400 font-bold bg-slate-800/50" (click)="closeMenu()" class="text-slate-300 hover:text-white text-base py-3 px-4 rounded-lg transition-colors">Proyectos</a>
      <a routerLink="/contacto" routerLinkActive="text-sky-400 font-bold bg-slate-800/50" (click)="closeMenu()" class="text-slate-300 hover:text-white text-base py-3 px-4 rounded-lg transition-colors">Contacto</a>

      <div class="pt-4 mt-2 border-t border-slate-800">
        <a href="/cv-daw.pdf" target="_blank" download="CV_Ricardo-Fernandez.pdf" class="block text-center w-full bg-transparent border border-outline text-on-surface hover:bg-surface-variant transition-all rounded-full px-4 py-3 font-label-caps text-label-caps cursor-pointer">
          Descargar CV
        </a>
      </div>

    </nav>
  </div>
</header>
