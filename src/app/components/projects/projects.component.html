<main class="flex-grow flex flex-col items-center py-20 px-4 md:px-8">
  <div class="w-full max-w-[1280px] flex flex-col gap-12">

    <header class="flex flex-col gap-4 max-w-2xl text-center md:text-left mx-auto md:mx-0">
      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-50 tracking-tight">Trabajos Destacados</h1>
      <p class="text-lg text-slate-400">
        Una colección de proyectos que demuestran mi profundidad técnica y precisión en el diseño.
      </p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      @for (project of projects; track project.id) {

        <article class="group bg-slate-900 border border-slate-700/80 rounded-[1rem] overflow-hidden hover:bg-slate-800 transition-colors duration-300 flex flex-col relative shadow-sm">

          <div class="aspect-video overflow-hidden relative border-b border-slate-800/50">
            <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500"/>
          </div>

          <div class="p-6 flex flex-col flex-grow">
            <h2 class="text-2xl font-bold text-slate-50 mb-3">{{ project.title }}</h2>

            <p class="text-base text-slate-400 mb-6 leading-relaxed">
              {{ project.description }}
            </p>

            <div class="flex flex-wrap gap-2 mb-6">
              @for (tech of project.technologies; track tech) {
                <span class="bg-slate-800 border border-slate-700 text-slate-200 text-xs font-semibold tracking-wider px-3 py-1.5 rounded-md">
                  {{ tech }}
                </span>
              }
            </div>

              <a [href]="project.link" target="_blank" class="mt-auto px-5 py-2.5 bg-sky-500/10 border border-sky-500/20 text-sky-400 hover:bg-sky-500 hover:text-white font-medium text-sm rounded-lg flex items-center gap-2 w-fit transition-all duration-300 group/link shadow-sm hover:shadow-[0_0_15px_rgba(14,165,233,0.4)]">
                Ver Proyecto
                <svg class="w-4 h-4 group-hover/link:translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
              </a>

          </div>

        </article>
      }
    </div>

  </div>
</main>
