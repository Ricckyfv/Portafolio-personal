<main class="flex-grow w-full max-w-[1280px] mx-auto px-4 md:px-4 pt-22 pb-20 md:pt-24 md:pb-10 flex flex-col items-center justify-center min-h-[80vh]">
  <div
    class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center"
  >
    <div
      class="w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-primary/10 rounded-full blur-[120px] opacity-50 animate-pulse duration-[4000ms]"
    ></div>
  </div>

  <div
    class="max-w-container-max mx-auto w-full z-10 grid grid-cols-1 lg:grid-cols-12 gap-gutter items-center md:py-5"
  >
    <div
      class="lg:col-span-7 flex flex-col gap-stack-lg text-center lg:text-left z-10"
    >
      <div class="space-y-stack-sm">
        <div class="inline-flex items-center justify-center lg:justify-start">
          <span
            class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 font-label-caps text-label-caps text-primary tracking-widest uppercase shadow-[0_0_15px_rgba(137,206,255,0.1)]"
          >
            🚀 Desarrollador Web
          </span>
        </div>

        <h1
          class="font-h1 text-4xl md:text-5xl lg:text-h1 text-on-surface font-extrabold leading-tight tracking-tight mt-4"
        >
          Construyo aplicaciones web <br class="hidden lg:block" />
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-primary via-sky-400 to-primary-container relative inline-block"
          >
            rápidas y escalables
            <svg
              class="absolute w-full h-3 -bottom-2 left-0 text-primary/30"
              viewBox="0 0 100 10"
              preserveAspectRatio="none"
            >
              <path
                d="M0 5 Q 50 10 100 5"
                stroke="currentColor"
                stroke-width="2"
                fill="transparent"
              />
            </svg>
          </span>
        </h1>
      </div>

      <p
        class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto lg:mx-0 leading-relaxed"
      >
        Desarrollo soluciones con Angular y tecnologías modernas, cuidando tanto
        el rendimiento técnico como la experiencia visual del usuario.
      </p>

      <div
        class="flex flex-col sm:flex-row gap-5 justify-center lg:justify-start pt-stack-sm"
      >
        <a
          routerLink="/proyectos"
          class="bg-primary-container text-white px-8 py-4 rounded-full font-label-caps text-label-caps tracking-widest hover:bg-sky-500 hover:shadow-[0_10px_20px_rgba(14,165,233,0.3)] hover:-translate-y-1 active:scale-95 transition-all duration-300 flex items-center justify-center gap-3 group"
        >
          Ver Proyectos
          <svg
            class="w-4 h-4 group-hover:translate-x-1 transition-transform"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            ></path>
          </svg>
        </a>
        <a
          routerLink="/contacto"
          class="bg-surface/50 backdrop-blur-sm border border-outline/50 text-on-surface px-8 py-4 rounded-full font-label-caps text-label-caps tracking-widest hover:bg-surface-variant hover:border-primary-container hover:-translate-y-1 active:scale-95 transition-all duration-300 flex items-center justify-center shadow-lg"
        >
          Contactar
        </a>
      </div>
    </div>

    <div
      class="lg:col-span-5 hidden lg:flex justify-end relative perspective-1000"
    >
      <div
        class="relative w-full aspect-square max-w-[450px] rounded-3xl overflow-hidden bg-surface-container border border-surface-variant shadow-2xl flex items-center justify-center group hover:-translate-y-2 hover:rotate-1 transition-all duration-500 hover:shadow-[0_20px_40px_rgba(14,165,233,0.15)]"
      >
        <div
          class="absolute inset-0 bg-gradient-to-br from-surface-container-high/20 to-surface-container-lowest/40 backdrop-blur-[2px] z-10 border border-white/5 rounded-3xl transition-all duration-500 group-hover:border-primary/30 pointer-events-none"
        ></div>

        <img
          src="/dev-writing.jpg"
          alt="Mi perfil"
          class="absolute inset-0 w-full h-full object-cover z-0 group-hover:scale-110 transition-transform duration-700"
        />

        <div
          class="absolute inset-0 bg-slate-900/40 z-0 group-hover:bg-slate-900/20 transition-colors duration-700"
        ></div>

        <div
          class="absolute z-20 top-[8%] left-[8%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_4s_ease-in-out_infinite] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-red-600"></span> Angular
          </div>
        </div>

        <div
          class="absolute z-20 top-[12%] right-[10%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_5s_ease-in-out_infinite_reverse] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-orange-500"></span> Java
          </div>
        </div>

        <div
          class="absolute z-20 top-[35%] left-[4%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_6s_ease-in-out_infinite] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500"></span> Spring Boot
          </div>
        </div>

        <div
          class="absolute z-20 top-[42%] right-[4%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_4.5s_ease-in-out_infinite_reverse] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-cyan-400"></span> Tailwind
          </div>
        </div>

        <div
          class="absolute z-20 bottom-[30%] right-[15%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_5.5s_ease-in-out_infinite] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-400"></span> MySQL
          </div>
        </div>

        <div
          class="absolute z-20 bottom-[20%] left-[8%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_6.5s_ease-in-out_infinite_reverse] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-600"></span> Docker
          </div>
        </div>

        <div
          class="absolute z-20 bottom-[10%] right-[8%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_5s_ease-in-out_infinite] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500"></span> TypeScript
          </div>
        </div>

        <div
          class="absolute z-20 bottom-[6%] left-[35%] bg-surface/90 backdrop-blur-xl border border-primary/30 px-4 py-2 rounded-full font-label-caps text-label-caps text-primary shadow-xl animate-[bounce_7s_ease-in-out_infinite_reverse] hover:scale-110 cursor-default transition-transform hover:bg-primary/10 hover:border-primary"
        >
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-gray-200"></span> GitHub
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
